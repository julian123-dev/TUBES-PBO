<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistem Pembayaran Sport</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Data Pembayaran Sport</h2>

    <a href="/tambah" class="btn btn-primary mb-3">
        Tambah Pembayaran
    </a>

    <!-- TABEL PEMBAYARAN -->
    <table class="table table-bordered">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nama Pelanggan</th>
            <th>Metode</th>
            <th>Jumlah</th>
            <th>Aksi</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="p : ${listPembayaran}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.namaPelanggan}"></td>
            <td th:text="${p.metodePembayaran}"></td>
            <td th:text="${p.jumlah}"></td>

            <td>
                <a th:href="@{/hapus/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm">
                    Hapus
                </a>
            </td>
        </tr>

        </tbody>

    </table>

    <hr class="my-5">

    <!-- DATA MEMBER -->
    <h2>Data Member</h2>

    <table class="table table-bordered">

        <thead class="table-success">
        <tr>
            <th>ID</th>
            <th>Nama</th>
            <th>No HP</th>
            <th>Jenis Member</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="m : ${listMember}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.nama}"></td>
            <td th:text="${m.noHp}"></td>
            <td th:text="${m.jenisMember}"></td>
        </tr>

        </tbody>

    </table>

    <hr class="my-5">

    <!-- HISTORY PEMBAYARAN -->
    <h2>History Pembayaran</h2>

    <table class="table table-bordered">

        <thead class="table-warning">
        <tr>
            <th>ID</th>
            <th>Nama Member</th>
            <th>Metode Pembayaran</th>
            <th>Jumlah</th>
            <th>Tanggal</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="h : ${listHistory}">
            <td th:text="${h.id}"></td>
            <td th:text="${h.namaMember}"></td>
            <td th:text="${h.metodePembayaran}"></td>
            <td th:text="${h.jumlah}"></td>
            <td th:text="${#temporals.format(h.tanggal,'dd-MM-yyyy (HH:mm:ss)')}"></td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
