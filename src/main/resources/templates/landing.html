<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SportSync - Booking Lapangan Olahraga</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <nav>
        <h2>SportSync</h2>
        <div>
            <a th:href="@{/admin}">Login</a>
            <a th:href="@{/register}">Daftar</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Booking Lapangan Olahraga Jadi Mudah</h1>
        <p>Temukan dan pesan lapangan favoritmu kapan saja, di mana saja</p>
        <a th:href="@{/register}">Mulai Booking</a>
    </section>

    <section class="lapangan-section">
        <h2>Lapangan Tersedia</h2>

        <div class="lapangan-grid">

            <div class="lapangan-card">
                <img th:src="@{/images/futsal.jpg}" alt="Lapangan Futsal" class="lapangan-image">
                <h3>Lapangan Futsal</h3>
            </div>

            <div class="lapangan-card">
                <img th:src="@{/images/basket.jpeg}" alt="Lapangan Basket" class="lapangan-image">
                <h3>Lapangan Basket</h3>
            </div>

            <div class="lapangan-card">
                <img th:src="@{/images/badminton.webp}" alt="Lapangan Badminton" class="lapangan-image">
                <h3>Lapangan Badminton</h3>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 SportSync. Tugas Besar Pemrograman Berorientasi Objek.</p>
    </footer>

</body>
</html>
